<div class="auth-form">
  <p class="eyebrow">Welcome Back</p>
  <h2 class="section-heading">Signin</h2>
  <form [formGroup]="form" (ngSubmit)="signIn()">
    <label><span>Email</span><input class="field" formControlName="email" type="email"></label>
    <label><span>Password</span><input class="field" formControlName="password" type="password"></label>
    <button type="submit" class="btn-primary">Signin</button>
  </form>
  <p>New here? <a routerLink="/auth/signup">Create an account</a></p>
</div>
